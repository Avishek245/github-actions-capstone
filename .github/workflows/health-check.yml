name: Health Check

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:latest

      - name: Run Container
        run: |
          docker run -d -p 3000:3000 --name app ${{ secrets.DOCKER_USERNAME }}/github-actions-practice:latest
          sleep 5

      - name: Curl Health
        run: |
          if curl -f http://localhost:3000/health; then
            STATUS="PASSED"
          else
            STATUS="FAILED"
            exit 1
          fi

          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Status: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        run: docker rm -f app